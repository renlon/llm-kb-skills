[pytest]
testpaths =
    plugins/kb/skills/kb-publish/scripts/tests
    plugins/kb/skills/kb/scripts/tests
    plugins/kb/skills/kb-notebooklm/scripts/tests
# importlib mode gives each conftest.py a fully-qualified module name derived
# from its absolute path, eliminating ImportPathMismatchError when all three
# test dirs are discovered in one pytest invocation.
addopts = --import-mode=importlib
